<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #0a0a12;
      color: #cbd5e1;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e1e2e;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      transition: background 0.3s;
    }
    .dot.idle { background: #6b7280; }
    .dot.working { background: #f59e0b; box-shadow: 0 0 8px #f59e0b44; animation: pulse 1s infinite; }
    .dot.synced { background: #34d399; box-shadow: 0 0 8px #34d39944; }
    .dot.auto { background: #0ea5e9; box-shadow: 0 0 8px #0ea5e944; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .title {
      font-size: 13px;
      font-weight: 700;
      color: #f1f5f9;
    }
    .version {
      font-size: 9px;
      color: #4b5563;
      margin-left: auto;
    }

    .sync-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #34d39933;
      background: #34d39910;
      color: #34d399;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 10px;
    }
    .sync-btn:hover { background: #34d39920; border-color: #34d39955; }
    .sync-btn:disabled { opacity: 0.5; cursor: wait; }
    .sync-btn.stop {
      background: #f8717110;
      border-color: #f8717133;
      color: #f87171;
    }
    .sync-btn.stop:hover { background: #f8717120; }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #111118;
    }
    .toggle-label { font-size: 11px; color: #94a3b8; }
    .toggle {
      position: relative;
      width: 36px; height: 20px;
      border-radius: 10px;
      background: #1e1e2e;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle.on { background: #0ea5e9; }
    .toggle .knob {
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #fff;
      transition: left 0.2s;
    }
    .toggle.on .knob { left: 18px; }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 11px;
    }
    .status-label { color: #6b7280; }
    .status-value { color: #94a3b8; font-weight: 500; }
    .status-value.ok { color: #34d399; }
    .status-value.warn { color: #f59e0b; }
    .status-value.err { color: #f87171; }

    .progress {
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      background: #0a0e1a;
      border: 1px solid #1e1e2e;
      font-size: 11px;
      color: #94a3b8;
      line-height: 1.6;
    }
    .progress .step { display: flex; gap: 6px; align-items: center; }
    .progress .step .icon { width: 14px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot idle" id="dot"></div>
    <span class="title">Coinstep Tapbit 동기화</span>
    <span class="version">v1.1</span>
  </div>

  <button class="sync-btn" id="sync-btn">🔄 동기화 시작</button>

  <div class="toggle-row">
    <span class="toggle-label">자동 갱신 (30초 주기)</span>
    <div class="toggle" id="auto-toggle">
      <div class="knob"></div>
    </div>
  </div>

  <div class="progress" id="progress" style="display:none"></div>

  <div style="margin-top: 10px; border-top: 1px solid #111118; padding-top: 8px;">
    <div class="status-row">
      <span class="status-label">상태</span>
      <span class="status-value" id="st-state">대기 중</span>
    </div>
    <div class="status-row">
      <span class="status-label">마지막 동기화</span>
      <span class="status-value" id="st-time">—</span>
    </div>
    <div class="status-row">
      <span class="status-label">유저</span>
      <span class="status-value" id="st-users">—</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
